<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAGAMAMPLOP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- JUDUL -->
    <h1 class="title">
        Anda Mendapatkan Surat Hadiah
    </h1>

    <!-- AMPLOP -->
    <div class="envelope" id="envelope">

        <div class="envelope-glow"></div>

        <div class="envelope-body">

            ✉️

        </div>

    </div>

    <!-- PETUNJUK -->
    <p class="click-text">
        Klik amplop untuk membuka surat hadiah
    </p>

</div>

<!-- POPUP SURAT -->
<div class="popup" id="popup">

    <div class="popup-card">

        <div class="popup-header">

            🎉 SELAMAT 🎉

        </div>

        <div class="popup-text">

            Anda mendapatkan hadiah saldo sebesar

        </div>

        <div class="reward" id="reward">

            Rp0

        </div>

        <button
            class="claim-btn"
            id="claimBtn">

            CLAIM HADIAH

        </button>

    </div>

</div>

<!-- POPUP SUDAH CLAIM -->
<div class="used-popup" id="usedPopup">

    <div class="used-card">

        <h2>
            SURAT SUDAH DIGUNAKAN
        </h2>

        <p>
            User ID ini sudah pernah mengambil hadiah.
        </p>

    </div>

</div>

<!-- TEMPAT CONFETTI -->
<div id="confetti-container"></div>

<script src="script.js"></script>

</body>
</html>
